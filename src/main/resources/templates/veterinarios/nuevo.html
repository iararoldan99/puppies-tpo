<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuevo Veterinario — Gud Boy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/nav :: navbar}"></nav>

<div class="container mt-4" style="max-width:540px;">
  <h2 class="mb-4">🩺 Registrar veterinario</h2>

  <!-- Flash messages -->
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" action="/veterinarios/nuevo">
        <div class="mb-3">
          <label class="form-label fw-semibold">ID (clave única) <span class="text-danger">*</span></label>
          <input type="text" name="id" class="form-control" placeholder="Ej: v3, vet-jones" required>
          <div class="form-text">Referencia externa al modulo de autenticacion.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre completo <span class="text-danger">*</span></label>
          <input type="text" name="nombre" class="form-control" placeholder="Dr. Apellido" required>
        </div>

        <div class="row g-3 mb-3">
          <div class="col">
            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input type="email" name="email" class="form-control" placeholder="vet@gudboy.com" required>
          </div>
          <div class="col">
            <label class="form-label fw-semibold">Teléfono</label>
            <input type="text" name="telefono" class="form-control" placeholder="1199887766">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Matrícula <span class="text-danger">*</span></label>
          <input type="text" name="matricula" class="form-control" placeholder="MP-999" required>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">Registrar</button>
          <a href="/veterinarios" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
