<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Animales — Gud Boy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/nav :: navbar}"></nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>🐶 Animales en el refugio</h2>
    <a href="/animales/nuevo" class="btn btn-success">+ Registrar animal</a>
  </div>

  <!-- Flash messages -->
  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:if="${#lists.isEmpty(animales)}" class="alert alert-info">
    No hay animales registrados todavia. <a href="/animales/nuevo">Registrar el primero</a>.
  </div>

  <div th:unless="${#lists.isEmpty(animales)}" class="card shadow-sm">
    <table class="table table-hover mb-0">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Nombre / Especie</th>
          <th>Tipo</th>
          <th>Salud</th>
          <th>Estado ciclo</th>
          <th>Adoptable</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="animal : ${animales}">
          <td th:text="${animal.id()}"></td>
          <td th:text="${animal.nombre()}"></td>
          <td>
            <span th:if="${animal.especie() == 'DOMESTICO'}" class="badge bg-success">DOMÉSTICO</span>
            <span th:unless="${animal.especie() == 'DOMESTICO'}" class="badge bg-secondary">SALVAJE</span>
          </td>
          <td th:text="${animal.condicionMedica()}"></td>
          <td>
            <span th:switch="${animal.estadoCiclo()}">
              <span th:case="'DISPONIBLE'" class="badge bg-success">DISPONIBLE</span>
              <span th:case="'EN_TRATAMIENTO'" class="badge bg-warning text-dark">EN TRATAMIENTO</span>
              <span th:case="'ADOPTADO'" class="badge bg-secondary">ADOPTADO</span>
            </span>
          </td>
          <td>
            <span th:if="${animal.puedeSerAdoptado()}" class="text-success fw-bold">✓</span>
            <span th:unless="${animal.puedeSerAdoptado()}" class="text-danger fw-bold">✗</span>
          </td>
          <td>
            <a th:href="@{/animales/{id}(id=${animal.id()})}" class="btn btn-sm btn-outline-primary">Ver</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
