<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuevo Animal — Gud Boy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/nav :: navbar}"></nav>

<div class="container mt-4" style="max-width:540px;">
  <h2 class="mb-4">🐾 Registrar animal</h2>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" action="/animales/nuevo">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input type="text" name="nombre" class="form-control" placeholder="Ej: Firulais, Michi..." required>
          <div class="form-text">El nombre propio del animal.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Especie <span class="text-danger">*</span></label>
          <input type="text" name="especie" class="form-control" placeholder="Ej: Perro, Gato, Loro..." required>
          <div class="form-text">La especie biológica del animal.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Tipo de animal <span class="text-danger">*</span></label>
          <select name="tipoDeAnimal" class="form-select" required>
            <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo}"></option>
          </select>
          <div class="form-text">Solo los animales DOMÉSTICOS pueden ser adoptados.</div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col">
            <label class="form-label fw-semibold">Altura (m)</label>
            <input type="number" step="0.01" name="altura" class="form-control" placeholder="0.40" required>
          </div>
          <div class="col">
            <label class="form-label fw-semibold">Peso (kg)</label>
            <input type="number" step="0.1" name="peso" class="form-control" placeholder="8.0" required>
          </div>
          <div class="col">
            <label class="form-label fw-semibold">Edad aprox.</label>
            <input type="number" name="edadAprox" class="form-control" placeholder="3" required>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">Registrar</button>
          <a href="/animales" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
