<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title th:text="'Animal #' + ${animal.id()} + ' — Gud Boy'">Animal — Gud Boy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/nav :: navbar}"></nav>

<div class="container mt-4" style="max-width:680px;">

  <!-- Flash messages -->
  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h4 class="mb-0">🐾 <span th:text="${animal.nombre()}"></span>
        <small class="text-muted" th:text="'#' + ${animal.id()}"></small>
      </h4>
      <span th:switch="${animal.estadoCiclo()}">
        <span th:case="'DISPONIBLE'" class="badge bg-success fs-6">DISPONIBLE</span>
        <span th:case="'EN_TRATAMIENTO'" class="badge bg-warning text-dark fs-6">EN TRATAMIENTO</span>
        <span th:case="'ADOPTADO'" class="badge bg-secondary fs-6">ADOPTADO</span>
      </span>
    </div>

    <div class="card-body">
      <dl class="row">
        <dt class="col-sm-4">Tipo</dt>
        <dd class="col-sm-8">
          <span th:if="${animal.especie() == 'DOMESTICO'}" class="badge bg-success">DOMÉSTICO</span>
          <span th:unless="${animal.especie() == 'DOMESTICO'}" class="badge bg-secondary">SALVAJE</span>
        </dd>

        <dt class="col-sm-4">Condición médica</dt>
        <dd class="col-sm-8" th:text="${animal.condicionMedica()}"></dd>

        <dt class="col-sm-4">Adoptable</dt>
        <dd class="col-sm-8">
          <span th:if="${animal.puedeSerAdoptado()}" class="text-success fw-bold">✓ Sí</span>
          <span th:unless="${animal.puedeSerAdoptado()}" class="text-danger fw-bold">✗ No</span>
        </dd>
      </dl>

      <hr>

      <!-- Acciones State pattern -->
      <h6 class="fw-semibold mb-3">Transiciones de estado (patrón State)</h6>
      <div class="d-flex flex-wrap gap-2">

        <!-- Iniciar tratamiento: solo si DISPONIBLE -->
        <form th:if="${animal.estadoCiclo() == 'DISPONIBLE'}"
              th:action="@{/animales/{id}/iniciar-tratamiento(id=${animal.id()})}" method="post">
          <button type="submit" class="btn btn-warning">
            ⚕️ Iniciar tratamiento
          </button>
        </form>

        <!-- Finalizar tratamiento: solo si EN_TRATAMIENTO -->
        <form th:if="${animal.estadoCiclo() == 'EN_TRATAMIENTO'}"
              th:action="@{/animales/{id}/finalizar-tratamiento(id=${animal.id()})}" method="post">
          <button type="submit" class="btn btn-success">
            ✅ Finalizar tratamiento
          </button>
        </form>

        <!-- Ir a adoptar -->
        <a th:if="${animal.puedeSerAdoptado()}"
           href="/adopciones/nueva" class="btn btn-primary">
          🏠 Procesar adopción
        </a>
      </div>

      <hr>

      <!-- Exportar ficha — Strategy pattern -->
      <h6 class="fw-semibold mb-3">Exportar ficha técnica (patrón Strategy)</h6>
      <form th:action="@{/animales/{id}/exportar(id=${animal.id()})}" method="post" class="d-flex gap-2">
        <select name="formato" class="form-select" style="max-width:160px;">
          <option value="PDF">PDF</option>
          <option value="EXCEL">Excel</option>
        </select>
        <button type="submit" class="btn btn-outline-dark">📄 Exportar</button>
      </form>
      <div class="form-text mt-1">
        <code>ExportadorFactory</code> selecciona la estrategia según el formato elegido.
      </div>
    </div>

    <div class="card-footer">
      <a href="/animales" class="btn btn-outline-secondary btn-sm">← Volver al listado</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
