<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nueva Alarma — Gud Boy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/nav :: navbar}"></nav>

<div class="container mt-4" style="max-width:540px;">
  <h2 class="mb-4">🔔 Crear alarma veterinaria</h2>

  <div class="alert alert-info small">
    <strong>Patrones Command + Composite:</strong> cada acción es un Command. La alarma contiene
    un <code>GrupoAcciones</code> (Composite) que las ejecuta como unidad al dispararse.
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" action="/alarmas/nueva">
        <div class="mb-3">
          <label class="form-label fw-semibold">Animal <span class="text-danger">*</span></label>
          <select name="animalId" class="form-select" required>
            <option value="">-- Seleccionar animal --</option>
            <option th:each="a : ${animales}"
                    th:value="${a.id()}"
                    th:text="${a.nombre() + ' (#' + a.id() + ')'}">
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Periodicidad</label>
          <select name="periodicidad" class="form-select">
            <option th:each="p : ${periodicidades}" th:value="${p}" th:text="${p}"></option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold d-block">Acciones veterinarias <span class="text-danger">*</span></label>
          <div class="form-text mb-2">Seleccionar al menos una (cada una es un Command):</div>
          <div th:each="acc : ${accionesDisponibles}" class="form-check">
            <input class="form-check-input" type="checkbox" name="acciones"
                   th:value="${acc}" th:id="${acc}">
            <label class="form-check-label" th:for="${acc}" th:text="${acc}"></label>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-warning text-dark">Crear alarma</button>
          <a href="/alarmas" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
